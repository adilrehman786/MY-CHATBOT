<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rehan bade wala Chatbot</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="background"></div>

    <div class="chat-container">

        <!-- Header -->

        <header>

            <div class="logo">

                <div class="logo-circle">
                    🤖
                </div>

                <div>

                    <h2>Gemini Chatbot</h2>

                    <p>Powered by Gemini AI</p>

                </div>

            </div>

            <div class="header-buttons">

                <button id="themeBtn" title="Toggle Theme">

                    🌙

                </button>

                <button id="clearBtn">

                    🗑

                </button>

            </div>

        </header>

        <!-- Chat Area -->

        <div id="chat">

            <div class="welcome">

                <div class="welcome-icon">

                    🤖

                </div>

                <h1>Hello 👋</h1>

                <p>

                    I'm your Gemini AI assistant.

                </p>

                <div class="suggestions">

                    <button class="suggestion">

                        Explain JavaScript

                    </button>

                    <button class="suggestion">

                        Write a Python Program

                    </button>

                    <button class="suggestion">

                        Tell me a joke

                    </button>

                    <button class="suggestion">

                        Help me prepare for exams

                    </button>

                </div>

            </div>

        </div>

        <!-- Typing Indicator -->

        <div id="typing" class="typing hidden">

            <div class="bot-avatar">

                🤖

            </div>

            <div class="typing-bubble">

                <span></span>

                <span></span>

                <span></span>

            </div>

        </div>

        <!-- Input -->

        <div class="input-area">

            <input id="message" type="text" placeholder="Ask me anything...">

            <button id="sendBtn">

                ➤

            </button>

        </div>

        <footer>

<footer>

    <p>Made with ❤️ by <strong>Team Parakram</strong></p>

    

</footer>
        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
